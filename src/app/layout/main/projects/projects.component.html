<section id="projects">
  <h3 class="w-100 text-center">Projects</h3>
  <div class="d-flex justify-content-start align-items-center flex-column h-100">
    <ul class="list-unstyled row justify-content-start align-items-start h-100">
      <li class="mt-3 px-5" *ngFor="let project of projects; let index = index">
        <div *ngIf="index % 2 !== 0" class="h-100 nav-link card project mx-5">
          <div class="row g-0">
            <div class="col-md-7">
              <div class="card-header h4"> {{project.name}}</div>
              <div class="card-body"> {{project.description}}</div>
              <div class="card-footer pb-2 d-flex justify-content-between align-items-center">
                <div><span *ngFor="let stack of project.stacks" [ngbTooltip]="stack.tooltip" class="fs-3 ms-2 social"><i
                  class="{{stack.iconClass}}"></i></span></div>
                <div>
                  <a href="{{project.codeUrl}}" target="_blank" class="badge rounded-pill text-dark border">Code <i class="fa-brands fa-github fs-5 ms-1"></i></a>
                  <a href="{{project.demoUrl}}" target="_blank" class="badge rounded-pill text-dark border ms-1">Live demo <i class="fa-solid fa-up-right-from-square fs-5 ms-1"></i></a>
                </div>
              </div>
            </div>
            <div class="col-md-5 rounded-end" style="{{'background: url('+project.image+') center no-repeat; background-size: cover'}}">
            </div>
          </div>
        </div>
        <div *ngIf="index % 2 === 0" class="h-100 nav-link card project mx-5">
          <div class="row g-0">
            <div class="col-md-5 rounded-start" style="{{'background: url('+project.image+') center no-repeat; background-size: cover'}}">
            </div>
            <div class="col-md-7">
              <div class="card-header h4"> {{project.name}}</div>
              <div class="card-body"> {{project.description}}</div>
              <div class="card-footer pb-2 d-flex justify-content-between align-items-center">
                <div>
                  <a href="{{project.codeUrl}}" target="_blank" class="badge rounded-pill text-dark border">Code <i class="fa-brands fa-github fs-5 ms-1"></i></a>
                  <a href="{{project.demoUrl}}" target="_blank" class="badge rounded-pill text-dark border ms-1">Live demo <i class="fa-solid fa-up-right-from-square fs-5 ms-1"></i></a>
                </div>
                <div><span *ngFor="let stack of project.stacks" [ngbTooltip]="stack.tooltip" class="fs-3 ms-2 social"><i
                  class="{{stack.iconClass}}"></i></span></div>
              </div>
            </div>
          </div>
        </div>
      </li>
    </ul>
  </div>
</section>
